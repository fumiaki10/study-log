<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="">
  <meta name="author" content="">
  <title>CSS 入門</title>
  // ここに追加
  <link rel="stylesheet" href="../CSS/style.css">
  <script src="../JS/main.js"></script>
</head>

<body>

  <h1 class="special">I am a level one heading</h1>

  <p>This is a paragraph of text. In the text is a <span class="special">span element</span>
    and also a <a href="http://example.com">link</a>.</p>

  <p>This is the second paragraph. It contains an <em>emphasized</em> element.</p>

  <ul class="special2">
    <li>Item one</li>
    <li class="special">Item two</li>
    <li>Item <em>three</em></li>

    <a href="http://google.com">google</a>
    <a href="http://google.com">google</a>
    <a href="https://www.yahoo.co.jp/">Yahoo</a>
  </ul>

  <div class="flex-box">
    <div id="buttons">
      <input type="radio" name="button" value="1" id="flex_button1">
      <input type="radio" name="button" value="2" id="flex_button2">
      <input type="radio" name="button" value="3" id="flex_button3">
      <input type="radio" name="button" value="4" id="flex_button4">
      <input type="radio" name="button" value="5" id="flex_button5">
    </div>


    <section id="flex-container">
      <div class="flex-item item1"></div>
      <div class="flex-item item2"></div>
      <div class="flex-item item3"></div>
      <div class="flex-item item4"></div>
      <div class="flex-item item5"></div>
      <div class="flex-item item6"></div>

    </section>
  </div>






</body>

</html>
